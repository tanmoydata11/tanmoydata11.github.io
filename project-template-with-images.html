            });
            
            html += `
                    </div>
                    
                    <div class="screenshots-grid">
            `;
            
            // Add cleaning screenshots
            config.step2.screenshots.forEach((screenshot, index) => {
                html += `
                    <div class="screenshot-container" onclick="openModal('${screenshot.path}', '${screenshot.caption}')">
                        <div class="screenshot-header">
                            <span class="screenshot-label">📸 Cleaning Step ${index + 1}</span>
                            <span class="view-btn">🔍 Click to Enlarge</span>
                        </div>
                        <img src="${screenshot.path}" alt="${screenshot.caption}" class="screenshot-image" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22600%22 height=%22300%22%3E%3Crect width=%22600%22 height=%22300%22 fill=%22%232a2d3a%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-family=%22Arial%22 font-size=%2218%22 fill=%22%239aa0b5%22%3EAdd screenshot: ${screenshot.path}%3C/text%3E%3C/svg%3E'">
                        <div class="screenshot-caption">${screenshot.caption}</div>
                    </div>
                `;
            });
            
            html += `
                    </div>
                </div>
            `;
            
            // Step 3: Power BI with Screenshot
            html += `
                <div class="step-card">
                    <div class="step-number">3</div>
                    <div class="step-header">
                        <div class="step-icon">${config.step3.icon}</div>
                        <h3 class="step-title">${config.step3.title}</h3>
                    </div>
                    <p class="step-description">${config.step3.description}</p>
                    
                    <div class="features-grid">
            `;
            
            config.step3.features.forEach(feature => {
                html += `
                    <div class="feature-card">
                        <div class="feature-icon">${feature.icon}</div>
                        <div class="feature-title">${feature.title}</div>
                        <div class="feature-desc">${feature.description}</div>
                    </div>
                `;
            });
            
            html += `
                    </div>

                    <div class="dashboard-preview">
                        <div class="dashboard-header">
                            <h4 class="dashboard-title">Dashboard Preview</h4>
                            <span class="powerbi-badge">POWER BI</span>
                        </div>
                        <div class="screenshot-container" onclick="openModal('${config.step3.dashboardScreenshot}', '${config.step3.dashboardAlt}')">
                            <div class="screenshot-header">
                                <span class="screenshot-label">📊 Power BI Dashboard</span>
                                <span class="view-btn">🔍 Click to Enlarge</span>
                            </div>
                            <img src="${config.step3.dashboardScreenshot}" alt="${config.step3.dashboardAlt}" class="screenshot-image" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22800%22 height=%22500%22%3E%3Crect width=%22800%22 height=%22500%22 fill=%22%232a2d3a%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-family=%22Arial%22 font-size=%2220%22 fill=%22%239aa0b5%22%3EAdd your Power BI dashboard screenshot: ${config.step3.dashboardScreenshot}%3C/text%3E%3C/svg%3E'">
                        </div>
                    </div>
                </div>
            `;
            
            html += `
                        </div>
                    </section>

                    <section class="results">
                        <h2 class="section-title">Project Outcomes</h2>
                        <div class="results-grid">
            `;
            
            // Generate results
            config.results.forEach(result => {
                html += `
                    <div class="result-item">
                        <div class="result-value">${result.value}</div>
                        <div class="result-label">${result.label}</div>
                    </div>
                `;
            });
            
            html += `
                        </div>
                    </section>

                    <section class="cta">
                        <h2 class="section-title">${config.ctaTitle}</h2>
                        <p class="cta-subtitle">${config.ctaDescription}</p>
                        <div class="cta-buttons">
                            <button class="btn btn-primary" onclick="openSQLPopup()">
                                <span>👁️</span>
                                <span>View SQL Scripts</span>
                            </button>
                            <button class="btn btn-secondary" onclick="downloadPowerBI()">
                                <span>⬇️</span>
                                <span>Download Power BI File</span>
                            </button>
                        </div>
                    </section>

                    <footer>
                        <p>&copy; 2025 ${config.footerText}</p>
                    </footer>
                </div>
            `;
            
            document.getElementById('app').innerHTML = html;
            addAnimations();
        }

        // Modal functions
        function openModal(imagePath, title) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            const modalTitle = document.getElementById('modalTitle');
            
            modal.style.display = 'block';
            modalImg.src = imagePath;
            modalTitle.textContent = title;
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('imageModal');
            modal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // Close modal when clicking outside the image
        window.onclick = function(event) {
            const modal = document.getElementById('imageModal');
            if (event.target == modal) {
                closeModal();
            }
        }

        // Close modal with Escape key
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                closeModal();
            }
        });

        // View SQL Scripts - Opens popup with SQL screenshot
        function openSQLPopup() {
            const config = PROJECT_CONFIG;
            // Open the first SQL cleaning screenshot
            if (config.step2.screenshots && config.step2.screenshots.length > 0) {
                openModal(config.step2.screenshots[0].path, 'SQL Data Cleaning Scripts');
            } else {
                alert('SQL screenshots not configured. Add screenshot paths in PROJECT_CONFIG.step2.screenshots');
            }
        }

        // Download Power BI file
        function downloadPowerBI() {
            const config = PROJECT_CONFIG;
            const fileName = config.files.powerBiFile;
            
            // Check if file exists (in real scenario, this would be a server check)
            // For now, we'll create a download link
            const link = document.createElement('a');
            link.href = fileName;
            link.download = fileName;
            
            // Try to download
            link.click();
            
            // If file doesn't exist, show helpful message
            setTimeout(() => {
                alert(`Downloading: ${fileName}\n\nMake sure the .pbix file is in the same folder as this HTML file.\n\nFile path configured: ${fileName}`);
            }, 100);
        }

        function addAnimations() {
            const observerOptions = {
                threshold: 0.15,
                rootMargin: '0px'
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.opacity = '1';
                        entry.target.style.transform = 'translateY(0)';
                    }
                });
            }, observerOptions);

            document.querySelectorAll('.step-card, .result-item, .feature-card').forEach(el => {
                el.style.opacity = '0';
                el.style.transform = 'translateY(30px)';
                el.style.transition = 'all 0.6s ease';
                observer.observe(el);
            });
        }

        // Generate page on load
        generatePage();
    </script>
</body>
</html>
